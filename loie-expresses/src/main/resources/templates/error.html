<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<section class="section text-center" style="min-height:60vh">
  <div class="container-x">
    <h1 style="font-size:4rem" class="text-green" th:text="${code} ?: 'Oops'">Error</h1>
    <p class="text-muted" th:text="${message} ?: 'Something went wrong.'">Something went wrong.</p>
    <a class="btn btn-brand" th:href="@{/}">Back to home</a>
  </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
