<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | Admin - LOIE EXPRESSES'">Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script>
      // Weka theme mapema ili kuepuka mwanga wa ghafla (flash)
      (function(){var t=localStorage.getItem('loie-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();
    </script>
</head>
<body>

<!-- SIDEBAR -->
<aside th:fragment="sidebar(active)" class="admin-sidebar" id="sidebar">
    <div class="brand"><a th:href="@{/admin/dashboard}">LOIE<span>EXPRESSES</span></a></div>
    <nav class="menu">
        <div class="menu-label">Main</div>
        <a th:href="@{/admin/dashboard}" th:classappend="${active=='dashboard'}?'active'"><i class="fas fa-gauge-high"></i> <span data-i18n="menu.dashboard">Dashboard</span></a>

        <div class="menu-label">Content</div>
        <a th:href="@{/admin/settings}" th:classappend="${active=='settings'}?'active'"><i class="fas fa-sliders"></i> <span data-i18n="menu.settings">Website Settings</span></a>
        <a th:href="@{/admin/services}" th:classappend="${active=='services'}?'active'"><i class="fas fa-briefcase"></i> <span data-i18n="menu.services">Services</span></a>
        <a th:href="@{/admin/fleet}" th:classappend="${active=='fleet'}?'active'"><i class="fas fa-truck"></i> <span data-i18n="menu.fleet">Fleet</span></a>
        <a th:href="@{/admin/gallery}" th:classappend="${active=='gallery'}?'active'"><i class="fas fa-images"></i> <span data-i18n="menu.gallery">Gallery</span></a>
        <a th:href="@{/admin/news}" th:classappend="${active=='news'}?'active'"><i class="fas fa-newspaper"></i> <span data-i18n="menu.news">News</span></a>

        <div class="menu-label" data-i18n="menu.requests">Requests</div>
        <a th:href="@{/admin/bookings}" th:classappend="${active=='bookings'}?'active'"><i class="fas fa-calendar-check"></i> <span data-i18n="menu.bookings">Bookings</span></a>
        <a th:href="@{/admin/quotes}" th:classappend="${active=='quotes'}?'active'"><i class="fas fa-file-invoice-dollar"></i> <span data-i18n="menu.quotes">Quotes</span></a>
        <a th:href="@{/admin/loans}" th:classappend="${active=='loans'}?'active'"><i class="fas fa-motorcycle"></i> <span data-i18n="menu.loans">Loan Applications</span></a>
        <a th:href="@{/admin/consultations}" th:classappend="${active=='consultations'}?'active'"><i class="fas fa-handshake"></i> <span data-i18n="menu.consultations">Consultations</span></a>
        <a th:href="@{/admin/messages}" th:classappend="${active=='messages'}?'active'"><i class="fas fa-envelope"></i> <span data-i18n="menu.messages">Messages</span></a>

        <div class="menu-label" sec:authorize="hasRole('SUPER_ADMIN')" data-i18n="menu.admin">Administration</div>
        <a sec:authorize="hasRole('SUPER_ADMIN')" th:href="@{/admin/users}" th:classappend="${active=='users'}?'active'"><i class="fas fa-users-gear"></i> <span data-i18n="menu.users">Users</span></a>
    </nav>
</aside>

<!-- TOPBAR -->
<header th:fragment="topbar" class="admin-topbar">
    <button class="btn-hamburger" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('backdrop').classList.toggle('show')">
        <i class="fas fa-bars"></i>
    </button>
    <div class="ms-auto d-flex align-items-center gap-2">
        <a th:href="@{/}" target="_blank" class="text-decoration-none small d-none d-sm-inline"><i class="fas fa-globe me-1"></i> <span data-i18n="nav.viewsite">View site</span></a>

        <!-- Theme toggle (light / dark) -->
        <button type="button" class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle theme">
            <i class="fas fa-moon"></i>
        </button>

        <!-- Language toggle (Swahili / English) -->
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-language me-1"></i> <span id="langLabel">EN</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#" data-lang="en"><i class="fas fa-check me-2 lang-check" data-lang-check="en"></i>English</a></li>
                <li><a class="dropdown-item" href="#" data-lang="sw"><i class="fas fa-check me-2 lang-check" data-lang-check="sw"></i>Kiswahili</a></li>
            </ul>
        </div>

        <!-- Account dropdown -->
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-user-circle me-1"></i><span sec:authentication="name">admin</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" th:href="@{/admin/change-password}">
                        <i class="fas fa-key me-2"></i><span data-i18n="nav.changepw">Change password</span>
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="dropdown-item text-danger" type="submit">
                            <i class="fas fa-right-from-bracket me-2"></i><span data-i18n="nav.logout">Logout</span>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>

<div th:fragment="backdrop" id="backdrop" class="admin-backdrop" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show')"></div>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script>
    (function () {
      // ---------- THEME (light / dark) ----------
      var root = document.documentElement;
      function applyTheme(t) {
        root.setAttribute('data-theme', t);
        var icon = document.querySelector('#themeToggle i');
        if (icon) icon.className = (t === 'dark') ? 'fas fa-sun' : 'fas fa-moon';
      }
      var savedTheme = localStorage.getItem('loie-theme') || 'light';
      applyTheme(savedTheme);
      var tBtn = document.getElementById('themeToggle');
      if (tBtn) tBtn.addEventListener('click', function () {
        var next = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
        localStorage.setItem('loie-theme', next);
        applyTheme(next);
      });

      // ---------- LANGUAGE (English / Kiswahili) ----------
      var i18n = {
        en: {
          'nav.viewsite':'View site','nav.changepw':'Change password','nav.logout':'Logout',
          'menu.dashboard':'Dashboard','menu.settings':'Website Settings','menu.services':'Services',
          'menu.fleet':'Fleet','menu.gallery':'Gallery','menu.news':'News','menu.requests':'REQUESTS',
          'menu.bookings':'Bookings','menu.quotes':'Quotes','menu.loans':'Loan Applications',
          'menu.consultations':'Consultations','menu.messages':'Messages','menu.admin':'ADMINISTRATION',
          'menu.users':'Users',
          'cp.title':'Change Password','cp.sub':'Update your account password',
          'cp.force':'For your security, you must change the default password before continuing.',
          'cp.current':'Current password','cp.new':'New password','cp.confirm':'Confirm new password',
          'cp.save':'Update password'
        },
        sw: {
          'nav.viewsite':'Tazama tovuti','nav.changepw':'Badilisha password','nav.logout':'Toka',
          'menu.dashboard':'Dashibodi','menu.settings':'Mipangilio ya Tovuti','menu.services':'Huduma',
          'menu.fleet':'Magari','menu.gallery':'Picha','menu.news':'Habari','menu.requests':'MAOMBI',
          'menu.bookings':'Booking','menu.quotes':'Bei/Quotes','menu.loans':'Maombi ya Mkopo',
          'menu.consultations':'Ushauri','menu.messages':'Ujumbe','menu.admin':'UTAWALA',
          'menu.users':'Watumiaji',
          'cp.title':'Badilisha Password','cp.sub':'Sasisha password ya akaunti yako',
          'cp.force':'Kwa usalama wako, lazima ubadilishe password ya kawaida kabla ya kuendelea.',
          'cp.current':'Password ya sasa','cp.new':'Password mpya','cp.confirm':'Thibitisha password mpya',
          'cp.save':'Sasisha password'
        }
      };
      function applyLang(lang) {
        var dict = i18n[lang] || i18n.en;
        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          var key = el.getAttribute('data-i18n');
          if (dict[key]) el.textContent = dict[key];
        });
        var label = document.getElementById('langLabel');
        if (label) label.textContent = (lang === 'sw') ? 'SW' : 'EN';
        document.querySelectorAll('.lang-check').forEach(function (c) {
          c.style.visibility = (c.getAttribute('data-lang-check') === lang) ? 'visible' : 'hidden';
        });
      }
      var savedLang = localStorage.getItem('loie-lang') || 'en';
      applyLang(savedLang);
      document.querySelectorAll('[data-lang]').forEach(function (a) {
        a.addEventListener('click', function (e) {
          e.preventDefault();
          var lang = this.getAttribute('data-lang');
          localStorage.setItem('loie-lang', lang);
          applyLang(lang);
        });
      });
    })();
    </script>
</th:block>
</body>
</html>
