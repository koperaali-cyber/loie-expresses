<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body style="background:linear-gradient(120deg,#0d1b2a,#136437);min-height:100vh">
<div class="container-x d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="form-card" style="max-width:420px;width:100%">
    <h5 class="mb-3">Reset your password</h5>
    <div th:if="${message}" class="alert alert-info py-2" th:text="${message}"></div>
    <div th:if="${token}" class="alert alert-warning py-2 small">Dev token: <a th:href="@{'/reset-password?token=' + ${token}}" th:text="${token}"></a></div>
    <form th:action="@{/forgot-password}" method="post">
      <div class="mb-3"><label class="form-label">Username</label><input class="form-control" name="username" required></div>
      <button class="btn btn-brand w-100">Generate reset link</button>
    </form>
    <div class="text-center mt-3"><a class="small" th:href="@{/login}">&larr; Back to login</a></div>
  </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
