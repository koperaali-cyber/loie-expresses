<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Users')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('users')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head"><h1>User Management</h1><div class="sub">Super Admin, Admin and Editor accounts</div></div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="row g-3">
    <div class="col-lg-4"><div class="card-panel">
      <h5>Add / edit user</h5>
      <form th:action="@{/admin/users/save}" method="post">
        <input type="hidden" name="id" id="uid">
        <div class="mb-2"><label class="form-label">Full name</label><input class="form-control" name="fullName" id="ufull" required></div>
        <div class="mb-2"><label class="form-label">Username</label><input class="form-control" name="username" id="uname" required></div>
        <div class="mb-2"><label class="form-label">Email</label><input class="form-control" name="email" id="uemail"></div>
        <div class="mb-2"><label class="form-label">Role</label>
          <select class="form-select" name="role" id="urole">
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
          </select></div>
        <div class="mb-2"><label class="form-label">Password <span class="text-muted small">(blank = keep)</span></label><input class="form-control" type="password" name="password"></div>
        <button class="btn btn-brand w-100"><i class="fas fa-save me-1"></i> Save user</button>
        <button type="button" class="btn btn-outline-secondary w-100 mt-2" onclick="clearForm()">New user</button>
      </form>
    </div></div>
    <div class="col-lg-8"><div class="card-panel">
      <h5>Existing users</h5>
      <div class="table-responsive"><table class="table align-middle">
        <thead><tr><th>Name</th><th>Username</th><th>Role</th><th class="text-end">Actions</th></tr></thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.username}"></td>
            <td><span class="badge bg-dark" th:text="${u.role}"></span></td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary"
                th:attr="data-id=${u.id},data-name=${u.fullName},data-username=${u.username},data-email=${u.email},data-role=${u.role}"
                onclick="editUser(this)"><i class="fas fa-pen"></i></button>
              <form class="d-inline" th:action="@{'/admin/users/delete/' + ${u.id}}" method="post" onsubmit="return confirm('Delete user?')">
                <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button></form>
            </td>
          </tr>
        </tbody>
      </table></div>
    </div></div>
  </div>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
<script>
function editUser(btn){
  document.getElementById('uid').value=btn.dataset.id;
  document.getElementById('ufull').value=btn.dataset.name;
  document.getElementById('uname').value=btn.dataset.username;
  document.getElementById('uemail').value=btn.dataset.email||'';
  document.getElementById('urole').value=btn.dataset.role;
  window.scrollTo({top:0,behavior:'smooth'});
}
function clearForm(){
  document.getElementById('uid').value='';
  document.getElementById('ufull').value='';
  document.getElementById('uname').value='';
  document.getElementById('uemail').value='';
}
</script>
</body></html>
