<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Dashboard')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('dashboard')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>

<main class="admin-content">
  <div class="page-head"><h1>Dashboard</h1><div class="sub">Overview of your transport business</div></div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#1b8a4b"><i class="fas fa-calendar-check"></i></div><div><div class="num" th:text="${stats.bookings}">0</div><div class="lbl">Bookings</div></div></div></div>
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#f5b301"><i class="fas fa-file-invoice-dollar"></i></div><div><div class="num" th:text="${stats.quotes}">0</div><div class="lbl">Quote requests</div></div></div></div>
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#0d6efd"><i class="fas fa-motorcycle"></i></div><div><div class="num" th:text="${stats.loans}">0</div><div class="lbl">Loan applications</div></div></div></div>
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#dc3545"><i class="fas fa-envelope"></i></div><div><div class="num" th:text="${stats.messages}">0</div><div class="lbl">Messages</div></div></div></div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#6f42c1"><i class="fas fa-handshake"></i></div><div><div class="num" th:text="${stats.consultations}">0</div><div class="lbl">Consultations</div></div></div></div>
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#20c997"><i class="fas fa-briefcase"></i></div><div><div class="num" th:text="${stats.services}">0</div><div class="lbl">Services</div></div></div></div>
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#fd7e14"><i class="fas fa-truck"></i></div><div><div class="num" th:text="${stats.vehicles}">0</div><div class="lbl">Vehicles</div></div></div></div>
    <div class="col-6 col-lg-3"><div class="stat-card"><div class="ic" style="background:#0dcaf0"><i class="fas fa-newspaper"></i></div><div><div class="num" th:text="${stats.news}">0</div><div class="lbl">News articles</div></div></div></div>
  </div>

  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card-panel"><h5>Bookings by status</h5><canvas id="bookingChart" height="220"></canvas></div>
    </div>
    <div class="col-lg-7">
      <div class="card-panel">
        <h5>Recent bookings</h5>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>Customer</th><th>Service</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>
              <tr th:if="${recentBookings.isEmpty()}"><td colspan="4" class="text-muted text-center">No bookings yet.</td></tr>
              <tr th:each="b : ${recentBookings}" th:if="${bStat.index < 6}">
                <td th:text="${b.customerName}">Name</td>
                <td th:text="${b.serviceType}">Service</td>
                <td><span class="badge-status" th:classappend="'s-' + ${b.status}" th:text="${b.status}">PENDING</span></td>
                <td class="text-muted small" th:text="${#temporals.format(b.createdAt,'dd MMM')}">Date</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
<script th:inline="javascript">
  const chartData = /*[[${chartData}]]*/ {};
  new Chart(document.getElementById('bookingChart'), {
    type:'doughnut',
    data:{ labels:Object.keys(chartData),
      datasets:[{ data:Object.values(chartData),
        backgroundColor:['#f5b301','#1b8a4b','#dc3545','#0d6efd','#6c757d'] }] },
    options:{ plugins:{ legend:{ position:'bottom' } } }
  });
</script>
</body>
</html>
