<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Service form')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('services')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head"><h1 th:text="${service.id != null ? 'Edit service' : 'Add service'}">Service</h1></div>
  <form class="card-panel" th:action="@{/admin/services/save}" th:object="${service}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:field="*{id}">
    <div class="row g-3">
      <div class="col-md-8"><label class="form-label">Title</label><input class="form-control" th:field="*{title}" required></div>
      <div class="col-md-4"><label class="form-label">Slug (url)</label><input class="form-control" th:field="*{slug}" placeholder="special-hire"></div>
      <div class="col-md-6"><label class="form-label">Font Awesome icon</label><input class="form-control" th:field="*{icon}" placeholder="fa-car"></div>
      <div class="col-md-6"><label class="form-label">Featured image</label><input class="form-control" type="file" name="imageFile" accept="image/*"></div>
      <div class="col-12"><label class="form-label">Short description</label><input class="form-control" th:field="*{shortDescription}"></div>
      <div class="col-12"><label class="form-label">Full description</label><textarea class="form-control" rows="4" th:field="*{description}"></textarea></div>
      <div class="col-12"><label class="form-label">Benefits (one per line)</label><textarea class="form-control" rows="4" th:field="*{benefits}"></textarea></div>
      <div class="col-12 form-check ms-2"><input class="form-check-input" type="checkbox" th:field="*{active}" id="act"><label class="form-check-label" for="act">Active</label></div>
    </div>
    <div class="mt-3"><button class="btn btn-brand px-4"><i class="fas fa-save me-1"></i> Save</button>
      <a class="btn btn-outline-secondary" th:href="@{/admin/services}">Cancel</a></div>
  </form>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
</body></html>
