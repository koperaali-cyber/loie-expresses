<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Change Password')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('change-password')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head">
    <h1 data-i18n="cp.title">Change Password</h1>
    <div class="sub" data-i18n="cp.sub">Update your account password</div>
  </div>

  <div th:if="${mustChange}" class="alert alert-warning">
    <i class="fas fa-triangle-exclamation me-1"></i>
    <span data-i18n="cp.force">For your security, you must change the default password before continuing.</span>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card-panel" style="max-width:520px">
    <form th:action="@{/admin/change-password}" method="post">
      <div class="mb-3">
        <label class="form-label" data-i18n="cp.current">Current password</label>
        <input class="form-control" type="password" name="currentPassword" required>
      </div>
      <div class="mb-3">
        <label class="form-label" data-i18n="cp.new">New password</label>
        <input class="form-control" type="password" name="newPassword" minlength="6" required>
      </div>
      <div class="mb-3">
        <label class="form-label" data-i18n="cp.confirm">Confirm new password</label>
        <input class="form-control" type="password" name="confirmPassword" minlength="6" required>
      </div>
      <button class="btn btn-brand px-4"><i class="fas fa-key me-1"></i> <span data-i18n="cp.save">Update password</span></button>
    </form>
  </div>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
</body></html>
