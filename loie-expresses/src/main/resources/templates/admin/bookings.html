<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Bookings')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('bookings')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head"><h1>Booking Requests</h1><div class="sub">Approve, reject or complete hire bookings</div></div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="card-panel"><div class="table-responsive"><table class="table align-middle">
    <thead><tr><th>Customer</th><th>Contact</th><th>Service</th><th>Route</th><th>Status</th><th>Update</th></tr></thead>
    <tbody>
      <tr th:if="${bookings.isEmpty()}"><td colspan="6" class="text-center text-muted">No bookings.</td></tr>
      <tr th:each="b : ${bookings}">
        <td><strong th:text="${b.customerName}"></strong><div class="small text-muted" th:text="${#temporals.format(b.createdAt,'dd MMM yyyy')}"></div></td>
        <td class="small"><div th:text="${b.phone}"></div><div class="text-muted" th:text="${b.email}"></div></td>
        <td th:text="${b.serviceType}"></td>
        <td class="small"><span th:text="${b.pickupLocation}"></span> &rarr; <span th:text="${b.dropoffLocation}"></span></td>
        <td><span class="badge-status" th:classappend="'s-' + ${b.status}" th:text="${b.status}"></span></td>
        <td>
          <form th:action="@{'/admin/bookings/status/' + ${b.id}}" method="post" class="d-flex gap-1">
            <select class="form-select form-select-sm" name="status" style="width:130px">
              <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == b.status}"></option>
            </select>
            <button class="btn btn-sm btn-brand"><i class="fas fa-check"></i></button>
          </form>
        </td>
      </tr>
    </tbody>
  </table></div></div>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
</body></html>
