<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('News')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('news')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div><h1>News</h1><div class="sub">Create and publish announcements</div></div>
    <a class="btn btn-brand" th:href="@{/admin/news/form}"><i class="fas fa-plus me-1"></i> New article</a>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="card-panel">
    <div class="table-responsive"><table class="table align-middle">
      <thead><tr><th>Title</th><th>Created</th><th>Status</th><th class="text-end">Actions</th></tr></thead>
      <tbody>
        <tr th:if="${news.isEmpty()}"><td colspan="4" class="text-center text-muted">No articles.</td></tr>
        <tr th:each="n : ${news}">
          <td th:text="${n.title}"></td>
          <td class="text-muted small" th:text="${#temporals.format(n.createdAt,'dd MMM yyyy')}"></td>
          <td><span class="badge bg-success" th:if="${n.published}">Published</span><span class="badge bg-secondary" th:unless="${n.published}">Draft</span></td>
          <td class="text-end">
            <form class="d-inline" th:action="@{'/admin/news/toggle/' + ${n.id}}" method="post">
              <button class="btn btn-sm btn-outline-warning" th:text="${n.published ? 'Unpublish' : 'Publish'}"></button></form>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/news/form(id=${n.id})}"><i class="fas fa-pen"></i></a>
            <form class="d-inline" th:action="@{'/admin/news/delete/' + ${n.id}}" method="post" onsubmit="return confirm('Delete?')">
              <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button></form>
          </td>
        </tr>
      </tbody>
    </table></div>
  </div>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
</body></html>
