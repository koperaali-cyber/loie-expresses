<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('News form')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('news')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head"><h1 th:text="${article.id != null ? 'Edit article' : 'New article'}">Article</h1></div>
  <form class="card-panel" th:action="@{/admin/news/save}" th:object="${article}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:field="*{id}">
    <div class="row g-3">
      <div class="col-md-8"><label class="form-label">Title</label><input class="form-control" th:field="*{title}" required></div>
      <div class="col-md-4"><label class="form-label">Author</label><input class="form-control" th:field="*{author}"></div>
      <div class="col-12"><label class="form-label">Summary</label><input class="form-control" th:field="*{summary}"></div>
      <div class="col-md-6"><label class="form-label">Image</label><input class="form-control" type="file" name="imageFile" accept="image/*"></div>
      <div class="col-md-6 form-check ms-2 mt-4"><input class="form-check-input" type="checkbox" th:field="*{published}" id="pub"><label class="form-check-label" for="pub">Published</label></div>
      <div class="col-12"><label class="form-label">Content (HTML allowed)</label><textarea class="form-control" rows="8" th:field="*{content}"></textarea></div>
    </div>
    <div class="mt-3"><button class="btn btn-brand px-4"><i class="fas fa-save me-1"></i> Save</button>
      <a class="btn btn-outline-secondary" th:href="@{/admin/news}">Cancel</a></div>
  </form>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
</body></html>
