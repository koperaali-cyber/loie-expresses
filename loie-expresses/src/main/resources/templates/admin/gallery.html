<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Gallery')}"></head>
<body>
<aside th:replace="~{fragments/admin-layout :: sidebar('gallery')}"></aside>
<div th:replace="~{fragments/admin-layout :: backdrop}"></div>
<header th:replace="~{fragments/admin-layout :: topbar}"></header>
<main class="admin-content">
  <div class="page-head"><h1>Gallery</h1><div class="sub">Upload and organise images into albums</div></div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="card-panel mb-3">
    <h5>Upload image</h5>
    <form th:action="@{/admin/gallery/upload}" method="post" enctype="multipart/form-data" class="row g-2 align-items-end">
      <div class="col-md-4"><label class="form-label">Title</label><input class="form-control" name="title" required></div>
      <div class="col-md-4"><label class="form-label">Album</label><input class="form-control" name="album" placeholder="e.g. Events"></div>
      <div class="col-md-3"><label class="form-label">Image</label><input class="form-control" type="file" name="imageFile" accept="image/*" required></div>
      <div class="col-md-1"><button class="btn btn-brand w-100"><i class="fas fa-upload"></i></button></div>
    </form>
  </div>
  <div class="card-panel">
    <div class="row g-3">
      <div th:if="${gallery.isEmpty()}" class="text-muted">No images uploaded.</div>
      <div class="col-6 col-md-3" th:each="g : ${gallery}">
        <div class="position-relative">
          <img th:src="@{'/uploads/' + ${g.fileName}}" class="w-100 rounded" style="height:150px;object-fit:cover">
          <form th:action="@{'/admin/gallery/delete/' + ${g.id}}" method="post" class="position-absolute top-0 end-0 m-1">
            <button class="btn btn-sm btn-danger" onclick="return confirm('Delete image?')"><i class="fas fa-trash"></i></button></form>
          <div class="small text-muted mt-1" th:text="${g.title}"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<th:block th:replace="~{fragments/admin-layout :: scripts}"></th:block>
</body></html>
