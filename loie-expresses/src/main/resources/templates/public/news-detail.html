<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${article != null ? article.title : 'News'})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-banner"><div class="container-x"><div class="crumb"><a th:href="@{/}">Home</a> / <a th:href="@{/news}">News</a></div>
  <h1 th:text="${article != null ? article.title : 'Article'}">Article</h1></div></div>
<section class="section" th:if="${article != null}">
  <div class="container-x" style="max-width:820px">
    <div class="text-muted small mb-3"><i class="fas fa-calendar me-1"></i><span th:text="${#temporals.format(article.createdAt,'dd MMMM yyyy')}"></span>
      <span th:if="${article.author != null}"> &middot; by <span th:text="${article.author}"></span></span></div>
    <img class="img-fluid rounded shadow-sm mb-4" th:if="${article.image != null}" th:src="@{'/uploads/' + ${article.image}}" alt="news">
    <p class="lead text-muted" th:text="${article.summary}">Summary</p>
    <div th:utext="${article.content}">Content</div>
  </div>
</section>
<section class="section" th:if="${article == null}"><div class="container-x text-center"><p>Article not found.</p><a class="btn btn-brand" th:href="@{/news}">Back to news</a></div></section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
