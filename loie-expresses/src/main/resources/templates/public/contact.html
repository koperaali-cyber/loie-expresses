<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contact Us')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-banner"><div class="container-x"><div class="crumb"><a th:href="@{/}">Home</a> / Contact</div><h1>Contact Us</h1></div></div>
<section class="section">
  <div class="container-x">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div class="row g-4">
      <div class="col-lg-5">
        <span class="section-eyebrow">Get in touch</span>
        <h3 class="section-title">We'd love to hear from you</h3>
        <p><i class="fas fa-map-marker-alt text-green me-2"></i><span th:text="${settings.address}"></span></p>
        <p><i class="fas fa-phone text-green me-2"></i><span th:text="${settings.phone}"></span></p>
        <p><i class="fas fa-envelope text-green me-2"></i><span th:text="${settings.email}"></span></p>
        <div class="ratio ratio-16x9 rounded overflow-hidden mt-3" th:if="${settings.googleMapEmbed != null}">
          <iframe th:src="${settings.googleMapEmbed}" style="border:0" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
      <div class="col-lg-7">
        <form class="form-card" th:action="@{/submit/contact}" method="post">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" required></div>
            <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone"></div>
            <div class="col-md-6"><label class="form-label">Subject</label><input class="form-control" name="subject"></div>
            <div class="col-12"><label class="form-label">Message</label><textarea class="form-control" name="message" rows="5" required></textarea></div>
            <div class="col-12"><button class="btn btn-brand" type="submit">Send message</button></div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
