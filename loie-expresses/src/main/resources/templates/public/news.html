<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('News')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-banner"><div class="container-x"><div class="crumb"><a th:href="@{/}">Home</a> / News</div><h1>News &amp; Announcements</h1></div></div>
<section class="section">
  <div class="container-x">
    <div th:if="${news.isEmpty()}" class="text-center text-muted">No news published yet.</div>
    <div class="row g-4">
      <div class="col-md-4" th:each="n : ${news}">
        <div class="card-x">
          <img class="card-img-top" th:if="${n.image != null}" th:src="@{'/uploads/' + ${n.image}}" alt="news">
          <div class="body">
            <div class="text-muted small mb-1" th:text="${#temporals.format(n.createdAt,'dd MMM yyyy')}">Date</div>
            <h5 th:text="${n.title}">Title</h5>
            <p class="text-muted small" th:text="${n.summary}">Summary</p>
            <a class="text-green fw-semibold" th:href="@{'/news/' + ${n.slug}}">Read more <i class="fas fa-arrow-right ms-1 small"></i></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
