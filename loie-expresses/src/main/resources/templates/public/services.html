<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Services')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-banner"><div class="container-x"><div class="crumb"><a th:href="@{/}">Home</a> / Services</div><h1>Our Services</h1></div></div>
<section class="section">
  <div class="container-x">
    <div class="row g-4">
      <div class="col-md-6 col-lg-4" th:each="s : ${services}">
        <div class="card-x"><div class="body">
          <div class="svc-icon"><i class="fas" th:classappend="${s.icon != null ? s.icon : 'fa-truck'}"></i></div>
          <h5 th:text="${s.title}">Service</h5>
          <p class="text-muted" th:text="${s.shortDescription}">Desc</p>
          <a class="btn btn-brand" th:href="@{'/services/' + ${s.slug}}">Learn more</a>
        </div></div>
      </div>
    </div>
  </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
