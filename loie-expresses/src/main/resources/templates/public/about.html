<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('About Us')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-banner"><div class="container-x"><div class="crumb"><a th:href="@{/}">Home</a> / About</div><h1>About Us</h1></div></div>
<section class="section">
  <div class="container-x">
    <div class="row g-5 align-items-center">
      <div class="col-lg-7">
        <span class="section-eyebrow">Our story</span>
        <h2 class="section-title" th:text="${settings.companyName}">LOIE EXPRESSES</h2>
        <p class="text-muted" th:text="${settings.aboutText}">About text.</p>
        <div class="row g-3 mt-2">
          <div class="col-6"><div class="why-item"><div class="ic"><i class="fas fa-bullseye"></i></div><div><strong>Our Mission</strong><div class="text-muted small">Affordable mobility for every Tanzanian.</div></div></div></div>
          <div class="col-6"><div class="why-item"><div class="ic"><i class="fas fa-eye"></i></div><div><strong>Our Vision</strong><div class="text-muted small">Tanzania's most trusted transport partner.</div></div></div></div>
        </div>
      </div>
      <div class="col-lg-5 text-center"><i class="fas fa-bus" style="font-size:10rem;color:var(--green)"></i></div>
    </div>
  </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
