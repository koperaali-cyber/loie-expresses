<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body style="background:linear-gradient(120deg,#0d1b2a,#136437);min-height:100vh">
<div class="container-x d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="form-card" style="max-width:420px;width:100%">
    <h5 class="mb-3">Set a new password</h5>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
    <form th:action="@{/reset-password}" method="post">
      <input type="hidden" name="token" th:value="${token}">
      <div class="mb-3"><label class="form-label">New password</label><input class="form-control" type="password" name="password" required minlength="6"></div>
      <button class="btn btn-brand w-100">Update password</button>
    </form>
    <div class="text-center mt-3"><a class="small" th:href="@{/login}">&larr; Back to login</a></div>
  </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body></html>
