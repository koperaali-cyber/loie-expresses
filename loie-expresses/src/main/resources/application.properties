# =========================================================
# LOIE EXPRESSES - Application configuration
# Database: PostgreSQL (required)
#
# Before first run, create the database:
#     CREATE DATABASE loie_db;
# Then set your credentials below (or via environment variables
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD).
# =========================================================
spring.application.name=LOIE EXPRESSES
server.port=8080

# ---------- PostgreSQL datasource ----------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loie_db}${DB_PARAMS:}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------- Thymeleaf ----------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# ---------- File uploads ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ---------- SEO / Google Search Console ----------
# Weka code ya uthibitisho kupitia env GOOGLE_SITE_VERIFICATION (au acha tupu)
google.site.verification=${GOOGLE_SITE_VERIFICATION:}

# ---------- Mail (optional: password-reset emails) ----------
# Leave username/password blank to have reset tokens shown on screen instead.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
